<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOWELL</title>
    <link
      rel="icon"
      type="image/png"
      href="bowell_favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="bowell_favicon/favicon.svg" />
    <link rel="shortcut icon" href="bowell_favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="bowell_favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- 전체 영역 -->
    <div class="wrap">
      <!-- 상단 -->
      <header>
        <div class="inner">
          <!-- 로고 영역-->
          <div class="logo">
            <!-- 로고 이미지 -->
            <div class="logo-img">
              <a href="#"><img src="image/logo.png" alt="보웰-로고" /> </a>
            </div>
            <!-- 로고 영역 - 메뉴 -->
            <div class="logo-menu">
              <p>로그인</p>
              <p>회원가입</p>
              <p>주문배송</p>
              <p>고객센터</p>
            </div>
          </div>
          <!-- 메뉴 영역 -->
          <div class="nav">
            <!-- 메뉴 -->
            <nav class="navi">
              <img src="icon/list-icon.png" alt="목록" />
              <p>신상품</p>
              <p>베스트</p>
              <p>컬렉션</p>
              <p>이벤트/혜택</p>
              <p>우물캠페인</p>
            </nav>
            <!-- 검색 및 장바구니, 마이페이지 -->
            <div class="navi_right">
              <!-- 검색 -->
              <div class="navi_search">
                <input type="text" placeholder="검색어를 입력해주세요" />
              </div>
              <!-- 장바구니, 마이페이지 -->
              <img src="icon/cart-icon.png" alt="장바구니" />
              <img src="icon/profile.png" alt="마이페이지" />
            </div>
          </div>
        </div>
      </header>
    </div>
  </body>
</html>
